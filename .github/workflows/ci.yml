name: PikoLink CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pikolink
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: pikolink_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://pikolink:testpass@localhost:5432/pikolink_test
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://pikolink:testpass@localhost:5432/pikolink_test
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: pytest --cov=apps --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
