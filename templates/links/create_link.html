{% extends "base.html" %}

{% block content %}
<h1>Create link</h1>

<form method="post">
  {% csrf_token %}

  <div>
    <label for="id_destination_url">Destination URL</label><br>
    {{ form.destination_url }}
  </div>

  <div>
    <label for="id_campaign_name">Campaign name</label><br>
    {{ form.campaign_name }}
  </div>

  <div>
    <label for="id_notes">Notes</label><br>
    {{ form.notes }}
  </div>

  <div>
    <label for="id_customer">Customer</label><br>
    {{ form.customer }}

    <br>
    <a href="#" id="newCustomer">+ Create new customer</a>
  </div>

  <br>

  <button type="submit">Create link</button>
</form>

<script>
(function () {
  const link = document.getElementById("newCustomer");
  if (!link) return;

  link.addEventListener("click", function (e) {
    e.preventDefault();

    const params = new URLSearchParams();

    const dest = document.getElementById("id_destination_url");
    const camp = document.getElementById("id_campaign_name");
    const notes = document.getElementById("id_notes");
    const cust = document.getElementById("id_customer");

    if (dest && dest.value) params.set("destination_url", dest.value);
    if (camp && camp.value) params.set("campaign_name", camp.value);
    if (notes && notes.value) params.set("notes", notes.value);
    if (cust && cust.value) params.set("customer", cust.value);

    const base = window.location.pathname; // ex: /app/links/new/
    const nextUrl = base + (params.toString() ? "?" + params.toString() : "");
    window.location.href =
      "/app/customers/new?next=" + encodeURIComponent(nextUrl);
  });
})();
</script>

{% endblock %}
