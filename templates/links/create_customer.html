{% extends "base.html" %}

{% block content %}
  <h1>Create Customer</h1>

  <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <input type="hidden" name="next" value="{{ next }}">

    <button type="submit">Save customer</button>
    <a href="{{ next }}">Cancel</a>
  </form>
{% endblock %}
