<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sign in</title>
  </head>
  <body>
    <h1>Sign in</h1>

    {% if form.errors %}
      <p style="color:red;">Login failed. Try again.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Sign in</button>
    </form>
  </body>
</html>
