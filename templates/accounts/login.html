{% extends "base.html" %}
{% block title %}Login - PikoLink{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <h2 class="text-2xl font-bold mb-6">Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 mt-4">Login</button>
  </form>
  <p class="mt-4 text-center text-gray-600">Don't have an account? <a href="/accounts/signup/" class="text-indigo-600">Sign Up</a></p>
</div>
{% endblock %}
