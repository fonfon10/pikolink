{% extends "base.html" %}
{% block title %}Reset Password - PikoLink{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <h2 class="text-2xl font-bold mb-6">Reset Password</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 mt-4">Reset Password</button>
  </form>
</div>
{% endblock %}
