{% extends "base.html" %}
{% block title %}Logout - PikoLink{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center">
  <h2 class="text-2xl font-bold mb-4">Are you sure you want to sign out?</h2>
  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Sign Out</button>
  </form>
</div>
{% endblock %}
