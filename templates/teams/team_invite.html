{% extends "base.html" %}
{% block title %}Invite Member - {{ team.name }} - PikoLink{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h2 class="text-2xl font-bold mb-6">Invite to {{ team.name }}</h2>
  <form method="post" class="bg-white shadow rounded-lg p-6 space-y-4">
    {% csrf_token %}
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" id="email" class="w-full px-4 py-2 border rounded-lg" placeholder="user@example.com" required>
    </div>
    <div>
      <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
      <select name="role" id="role" class="w-full px-4 py-2 border rounded-lg">
        <option value="viewer">Viewer</option>
        <option value="editor">Editor</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Send Invite</button>
  </form>
</div>
{% endblock %}
