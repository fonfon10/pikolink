{% extends "base.html" %}
{% block title %}Create Team - PikoLink{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h2 class="text-2xl font-bold mb-6">Create a Team</h2>
  <form method="post" class="bg-white shadow rounded-lg p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
      <input type="text" name="{{ field.html_name }}" id="{{ field.id_for_label }}" value="{{ field.value|default:'' }}"
             class="w-full px-4 py-2 border rounded-lg" placeholder="Team name">
      {% if field.errors %}<p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Create Team</button>
  </form>
</div>
{% endblock %}
